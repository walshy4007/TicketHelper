<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TicketHelper &mdash; Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e1f22;
      color: #dbdee1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #2b2d31;
      border-radius: 8px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .logo p {
      font-size: 13px;
      color: #949ba4;
      margin-top: 4px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #b5bac1;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #1e1f22;
      border: 1px solid #1e1f22;
      border-radius: 4px;
      color: #dbdee1;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #5865f2;
    }

    .error {
      background: #f23f43;
      color: #fff;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 11px;
      background: #5865f2;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4752c4; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>TicketHelper</h1>
      <p>Ticket Volume Dashboard</p>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password">
      <button type="submit">Log in</button>
    </form>
  </div>
</body>
</html>
